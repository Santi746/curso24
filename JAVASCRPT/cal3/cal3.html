<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tercera calculadora de la muerte</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <script src="cal3.js"></script>
    <section class="flex justify-center bg-green-400 rounded-xl mt-24 ml-[120px] mr-[120px] flex-col gap-8 p-6 border-4 border-black">
        <div class="flex justify-center mt-4" id="print">
            <p>CALCULADORA DE LA MUERTE---3</p>
        </div>
        <div>
            <input type="number" id="cal-input" class="w-full h-12 text-2xl rounded-xl p-2 border-4 border-black">
        </div>
        <div class="grid grid-cols-4 gap-4 justify-center">
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">7</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">8</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">9</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">X</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">6</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">5</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">4</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">-</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">3</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">2</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">1</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">÷</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">0</button>
            <button class="hover:bg-yellow-300 hover:scale-105 transition transform duration-150 rounded-xl">.</button> 
            <button class="bg-blue-400 rounded-xl h-12 w-14 hover:bg-yellow-300 hover:scale-105 transition transform duration-150">=</button>
        </div>
    </section>    
</body>
</html>
